name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request and give feedback on:
            - Correctness bugs and logic errors
            - Performance considerations
            - Adherence to the conventions in CLAUDE.md (design tokens, theme-sourced
              colors, the @Observable + environment state pattern, AppKit bridging)

            Be concise and direct. Render a single bullet list of issues to address,
            each with a code diff for the fix. Skip low-priority nits with no
            functional impact. Only mention test coverage if there is a significant
            gap. Review what's in the PR — do not suggest unrelated future work.
