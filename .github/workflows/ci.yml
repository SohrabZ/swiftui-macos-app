name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    name: Build & test (macOS)
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-

      # Hard gate: package must build and all tests must pass.
      - name: Build & test
        run: scripts/verify.sh --no-visual

      # Best-effort visual artifact (headless ImageRenderer). Never fails the run.
      - name: Render snapshot
        run: scripts/verify.sh
        continue-on-error: true

      - name: Upload snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot
          path: verify-artifacts/screenshot.png
          if-no-files-found: ignore
